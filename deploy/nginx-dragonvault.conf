# =============================================================================
# Dragon Vault — nginx site config template (REQ-061-L, REQ-069, REQ-070, REQ-075-L)
# =============================================================================
#
# Install: sudo cp nginx-dragonvault.conf /etc/nginx/sites-available/dragonvault
#          sudo ln -sf /etc/nginx/sites-available/dragonvault /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx
#
# Or run:  sudo bash install-nginx.sh
#
# After this config is in place, run setup-certbot.sh to obtain a Let's Encrypt
# certificate. Certbot rewrites the SSL directives and HTTP redirect block with
# its own managed markers. Do not hand-edit certbot-managed lines afterward.
#
# IMPORTANT — WebSocket map block
# -------------------------------
# The map directive below MUST appear in the http { } block of /etc/nginx/nginx.conf.
# The install-nginx.sh script checks for it and adds it if missing:
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }

# =============================================================================
# HTTPS server (REQ-061-L, REQ-075-L)
# SSL cert/key/include are added by certbot on first run.
# =============================================================================
server {
    server_name pwm.YOUR-SERVER-IP.nip.io;

    # --- Security headers (REQ-070) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.pwnedpasswords.com; media-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "clipboard-write=(self), publickey-credentials-get=(self), publickey-credentials-create=(self)" always;

    # --- Limits ---
    client_max_body_size 1m;

    # --- Gzip compression ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml font/woff font/woff2;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;

    # --- OCSP Stapling ---
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Service worker — never cache ---
    location = /sw.js {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Static files — 30-day cache ---
    location ~* \.(css|js|woff2?|svg|ico|png|jpg|gif|webp)$ {
        root /var/opt/dragonvault/publish/wwwroot;
        expires 30d;
        try_files $uri =404;
    }

    # --- All other requests → Kestrel on 127.0.0.1:5000 ---
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # SSL cert + key + include added by certbot on first run
}

# =============================================================================
# HTTP → HTTPS redirect (REQ-069)
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name pwm.YOUR-SERVER-IP.nip.io;
    return 301 https://$host$request_uri;
}
